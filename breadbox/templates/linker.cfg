
MEMORY {
{% for region in regions %}
    {{ region.name -}}
        : start = ${{ "%04X" | format(region.start) -}}
        , size = ${{ "%04X" | format(region.size) -}}
        , type = {{ region.type -}}
        {% if region.fill %}, fill = yes{% endif -%}
        , file = {% if region.file %}{{ region.file }}{% else %}""{% endif %};
{% endfor %}
}

SEGMENTS {
{% for segment in segments %}
    {{ segment.name -}}
    : load = "{{ segment.load -}}
    ", type = {{ segment.type -}}
    , optional = yes;
{% endfor %}
}

FEATURES {
    CONDES: type = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__,
            segment = KERNALROM,
            order = decreasing;
    CONDES: type = interruptor,
            label = __INTERRUPTOR_TABLE__,
            count = __INTERRUPTOR_COUNT__,
            segment = KERNALROM,
            order = decreasing;
}
