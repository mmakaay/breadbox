CPU: # Special name, triggers automatic selection of component "cpu".
  #component: cpu # <-- therefore this line could be omitted.
  type: 65c02
  clock_mhz: 1.0

# First "bus" device.
VIA0:
  component: via_w65c22
  address: $6000

# Second "bus" device.
VIA1:
  component: via_w65c22
  address: $6100

STATUS_LED:
  component: gpio_pin  # the via0 component has to handle this for codegen
  bus: VIA0
  direction: out   # limits generated code to only output macros
  pin: PA0    # Automatically derives use of Port A on the via0 bus

 # A group of GPIO pins that can be switched together.
PROGRESS_LEDS1:
  component: gpio_group  # the VIA1 component has to handle this for codegen.
  bus: VIA1
  port: A
  bits: "10100011"
  direction: in
  default: off

PROGRESS_LEDS2:
  component: gpio_group  # the VIA1 component has to handle this for codegen.
  bus: VIA1
  pins: [PA0, PA2, PA6, PA7]
  direction: in
  default: off

SOME_8BIT_PORT:
  component: gpio_group
  bus: VIA0
  port: A
  bits: 0xff
  default: off
  direction: out

LCD0:
  component: lcd_hd44780
  cmnd:
    bus: VIA1
    rwb_pin: PA0
    en_pin: PA1
    rs_pin: PA2
  data:
    bus: VIA1
    mode: 4bit
    port: A       # 4- bit mode uses pins 4-7, 8-bit mode uses all pins.

UART0:
  component: uart_6551
  type: w65c51    # Options: w65c51, um6551, m6551, generic, default "generic"
  address: $5000  # Standard Address16
  irq: on         # OnOff feature, default is on
  rts:            # Either None (RTS disabled) or a GPIO pin used for RTS signalling
    bus: VIA0
    pin: PA0
