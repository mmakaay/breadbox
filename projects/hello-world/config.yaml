CORE: 
  cpu: 65c02
  clock_mhz: 1.0

VIA:
  component: via_w65c22
  address: $6000

LCD0:
  component: lcd_hd44780
  cmnd:
    bus: VIA
    rs_pin: PA5
    rwb_pin: PA6
    en_pin: PA7
  data:
    bus: VIA
    mode: 8bit
    port: B

UART0:
  component: uart_6551
  type: w65c51
  address: $5000
  irq: on
  rts:
    bus: VIA
    pin: PA0
