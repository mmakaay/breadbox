CORE: 
  cpu: 65c02
  clock_mhz: 1.000

KERNAL:
  component: rom
  address: $8000
  size: $3000
  segments: ["KERNAL"]

ROM:
  address: $b000
  size: $5000

RAM:
  address: $0000
  size: $1000

BUS:
  component: via_w65c22
  address: $6000

DISPLAY:
  component: lcd_hd44780
  cmnd:
    bus: BUS
    rs_pin: PB0
    rwb_pin: PB1
    en_pin: PB2
  data:
    bus: BUS
    mode: 4bit
    port: B

CONSOLE:
  component: uart_6551
  type: um6551
  address: $5000
  irq: on
  rts:
    bus: BUS
    pin: PA0
  
