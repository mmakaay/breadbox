CORE:
  cpu: 6502
  clock_mhz: 1.000

VIA:
  component: via_w65c22
  address: $6000

LED:
  component: gpio_pin
  provider: VIA
  pin: PA1
  default: off
  direction: out

LCD:
  component: lcd_hd44780
  cmnd_pins:
    provider: VIA
    rs_pin: PB0
    rwb_pin: PB1
    en_pin: PB2
  data_pins:
    provider: VIA
    mode: 4bit
    port: B

LCD_SCREEN:
  component: screen
  provider: LCD

SERIAL:
  component: uart_6551
  type: r6551
  address: $5000
  irq: on
  rts:
    provider: VIA
    pin: PA0

SERIAL_SCREEN:
  component: screen
  provider: SERIAL

SERIAL_KEYBOARD:
  component: keyboard
  provider: SERIAL

SERIAL_TTY:
  component: tty
  keyboard: SERIAL_KEYBOARD
  screen: SERIAL_SCREEN

LCD_TTY:
  component: tty
  keyboard: SERIAL_KEYBOARD
  screen: LCD_SCREEN
